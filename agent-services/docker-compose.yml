services:
  journey-agents:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/agents  
    container_name: journey-agents
    restart: on-failure:3
    env_file:
      - .env
    ports:
      - "${AGENT_PORT}:8800"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://192.168.40.105:8000/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10  